<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Validify | Login</title>
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="auth-body">

  <main class="auth-page">

    <div class="auth-brand">
      <div class="auth-logo">
        <i class="fa-solid fa-check"></i>
      </div>

      <h1>
        <span>Valid</span><strong>ify</strong>
      </h1>
    </div>

    <section class="auth-card">

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form">
        <h2>Welcome Back!</h2>
        <p>Login or register to continue</p>

        <div id="loginMessage" class="auth-message hidden"></div>

        <div class="auth-input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <div class="auth-input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="auth-btn">Login</button>

        <div class="auth-switch">
          Don’t have an account?
          <button type="button" id="showRegisterBtn">Register here.</button>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form hidden">
        <h2>Create an Account</h2>
        <p>Register as a Vendor or Company Employee</p>

        <div id="registerMessage" class="auth-message hidden"></div>

        <div class="auth-input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="registerFullName" placeholder="Enter your full name" required>
        </div>

        <div class="auth-input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="registerEmail" placeholder="Enter your email" required>
        </div>

        <div class="auth-input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="registerPassword" placeholder="Enter your password" required>
        </div>

        <div class="auth-input-group">
          <i class="fa-solid fa-briefcase"></i>
          <select id="registerRole" required>
            <option value="">Select Account type</option>
            <option value="vendor">Vendor</option>
            <option value="company_employee">Company Employee</option>
          </select>
        </div>

        <button type="submit" class="auth-btn">Create Account</button>

        <div class="auth-switch">
          Already have an account?
          <button type="button" id="showLoginBtn">Login here.</button>
        </div>
      </form>

    </section>

  </main>

  <script src="login.js"></script>
</body>
</html>
